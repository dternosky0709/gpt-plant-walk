<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Plant Walk</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#173826" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Plant Walk" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
  <header class="app-header no-print">
    <div>
      <h1>GPT Plant Walk</h1>
      <p>Maintenance observations, photos, reports, and ChatGPT-ready summaries.</p>
    </div>
  </header>

  <main>
    <section class="card no-print hero-card">
      <h2>Plant Walk Dashboard</h2>
      <p>Start a new walk, capture issues, attach photos, and generate a professional report.</p>
      <button id="startWalkBtn">Start Plant Walk</button>
      <button id="viewWalksBtn" class="secondary">Previous Walks</button>
    </section>

    <section id="activeWalkSection" class="card hidden no-print">
      <div class="section-title-row">
        <div>
          <h2>Active Walk</h2>
          <p id="walkStartedText" class="muted"></p>
        </div>
        <span id="issueCountBadge" class="badge">0 Issues</span>
      </div>

      <label for="issueText">Observation</label>
      <textarea id="issueText" placeholder="Example: Kiln car track 3 limit switch damaged"></textarea>

      <div class="button-grid">
        <button id="voiceBtn" class="secondary">Start Voice Dictation</button>
        <button id="clearDraftBtn" class="danger">Clear Draft</button>
      </div>

      <label for="photoInput">Photos</label>
      <input id="photoInput" type="file" accept="image/*" capture="environment" multiple />
      <div id="selectedPhotoPreview" class="photo-grid"></div>

      <button id="saveIssueBtn">Save Issue</button>
      <button id="finishWalkBtn" class="secondary">Finish Walk / Generate Report</button>

      <h3>Saved Issues</h3>
      <div id="issueList"></div>
    </section>

    <section id="previousWalksSection" class="card hidden no-print">
      <h2>Previous Walks</h2>
      <div id="walkList"></div>
    </section>

    <section id="reportSection" class="card hidden">
      <div class="report-actions no-print">
        <button id="copyReportBtn">Copy ChatGPT Report</button>
        <button id="printPdfBtn" class="secondary">Save / Print PDF</button>
      </div>

      <h2 class="no-print">ChatGPT-Ready Report Text</h2>
      <textarea id="reportOutput" class="no-print" readonly></textarea>

      <article id="professionalReport"></article>
    </section>
  </main>

  <footer class="no-print">
    <p id="appVersionText">GPT Plant Walk</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
